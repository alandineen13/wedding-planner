openapi: 3.0.3

info:
  title: IDoList API
  description: REST API for the IDoList wedding planning platform
  version: 1.0.0

servers:
  - url: http://localhost:3000/api
    description: Local development

security:
  - bearerAuth: []

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: Resource not found

    # ── Auth ────────────────────────────────────────────────────

    User:
      type: object
      required: [id, email, name]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        weddingDate:
          type: string
          format: date
          nullable: true
        partnerName:
          type: string
          nullable: true
        venueName:
          type: string
          nullable: true

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
          description: JWT valid for 7 days
        user:
          $ref: '#/components/schemas/User'

    RegisterRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
        weddingDate:
          type: string
          format: date
        partnerName:
          type: string
        venueName:
          type: string

    # ── Dashboard ───────────────────────────────────────────────

    GuestStats:
      type: object
      required: [total, confirmed, declined, pending, maybe, plusOnes]
      properties:
        total:
          type: integer
        confirmed:
          type: integer
        declined:
          type: integer
        pending:
          type: integer
        maybe:
          type: integer
        plusOnes:
          type: integer

    BudgetSummary:
      type: object
      required: [totalBudget, totalEstimated, totalActual, totalPaid, totalOutstanding, variance]
      properties:
        totalBudget:
          type: number
        totalEstimated:
          type: number
        totalActual:
          type: number
        totalPaid:
          type: number
        totalOutstanding:
          type: number
        variance:
          type: number

    TaskStats:
      type: object
      required: [total, completed, inProgress, todo, overdue]
      properties:
        total:
          type: integer
        completed:
          type: integer
        inProgress:
          type: integer
        todo:
          type: integer
        overdue:
          type: integer

    SeatingStats:
      type: object
      required: [totalTables, totalSeats, seatedGuests, unseatedSeats]
      properties:
        totalTables:
          type: integer
        totalSeats:
          type: integer
        seatedGuests:
          type: integer
        unseatedSeats:
          type: integer

    DashboardResponse:
      type: object
      required: [guestStats, budgetSummary, taskStats, seatingStats]
      properties:
        guestStats:
          $ref: '#/components/schemas/GuestStats'
        budgetSummary:
          $ref: '#/components/schemas/BudgetSummary'
        taskStats:
          $ref: '#/components/schemas/TaskStats'
        seatingStats:
          $ref: '#/components/schemas/SeatingStats'
        daysUntilWedding:
          type: integer
          nullable: true
          description: Null if no wedding date set

    # ── Guests ──────────────────────────────────────────────────

    PlusOne:
      type: object
      required: [name]
      properties:
        name:
          type: string
        dietaryRequirements:
          type: string
          nullable: true

    Guest:
      type: object
      required: [id, firstName, lastName, inviteStatus, rsvpStatus, plusOneAllowed, rsvpToken, side, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        side:
          type: string
          enum: [bride, groom, both]
        group:
          type: string
          nullable: true
        inviteStatus:
          type: string
          enum: [not_sent, sent, delivered]
        rsvpStatus:
          type: string
          enum: [pending, confirmed, declined, maybe]
        dietaryRequirements:
          type: string
          nullable: true
        plusOneAllowed:
          type: boolean
        plusOne:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/PlusOne'
        tableId:
          type: string
          format: uuid
          nullable: true
        seatNumber:
          type: integer
          nullable: true
        rsvpToken:
          type: string
          format: uuid
        rsvpSubmittedAt:
          type: string
          format: date-time
          nullable: true
        accommodationRequired:
          type: boolean
          nullable: true
        transportRequired:
          type: boolean
          nullable: true
        songRequest:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    GuestWriteRequest:
      type: object
      required: [firstName, lastName, side, inviteStatus, rsvpStatus, plusOneAllowed]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        address:
          type: string
        side:
          type: string
          enum: [bride, groom, both]
        group:
          type: string
        inviteStatus:
          type: string
          enum: [not_sent, sent, delivered]
          default: not_sent
        rsvpStatus:
          type: string
          enum: [pending, confirmed, declined, maybe]
          default: pending
        dietaryRequirements:
          type: string
        plusOneAllowed:
          type: boolean
          default: false
        plusOne:
          $ref: '#/components/schemas/PlusOne'
        accommodationRequired:
          type: boolean
        transportRequired:
          type: boolean
        notes:
          type: string

    RsvpPublicView:
      type: object
      required: [firstName, lastName, rsvpStatus, plusOneAllowed]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        rsvpStatus:
          type: string
          enum: [pending, confirmed, declined, maybe]
        dietaryRequirements:
          type: string
          nullable: true
        plusOneAllowed:
          type: boolean
        plusOne:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/PlusOne'
        songRequest:
          type: string
          nullable: true
        message:
          type: string
          nullable: true

    RsvpSubmitRequest:
      type: object
      properties:
        rsvpStatus:
          type: string
          enum: [pending, confirmed, declined, maybe]
        dietaryRequirements:
          type: string
        songRequest:
          type: string
        message:
          type: string
        plusOne:
          $ref: '#/components/schemas/PlusOne'

    # ── Tables / Seating ────────────────────────────────────────

    SeatingTable:
      type: object
      required: [id, name, capacity, shape, guestIds]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        capacity:
          type: integer
          minimum: 1
        shape:
          type: string
          enum: [round, rectangular, oval]
        guestIds:
          type: array
          items:
            type: string
            format: uuid
        notes:
          type: string
          nullable: true
        positionX:
          type: number
          nullable: true
        positionY:
          type: number
          nullable: true

    TableWriteRequest:
      type: object
      required: [name, capacity]
      properties:
        name:
          type: string
        capacity:
          type: integer
          minimum: 1
        shape:
          type: string
          enum: [round, rectangular, oval]
          default: round
        notes:
          type: string
        positionX:
          type: number
        positionY:
          type: number

    AssignGuestRequest:
      type: object
      required: [guestId]
      properties:
        guestId:
          type: string
          format: uuid

    # ── Budget ──────────────────────────────────────────────────

    BudgetItem:
      type: object
      required: [id, name, category, estimatedCost, paymentStatus, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        category:
          type: string
          enum: [venue, catering, photography, videography, flowers, entertainment, attire,
                 accommodation, transport, stationery, hair_makeup, cake, rings, honeymoon, other]
        estimatedCost:
          type: number
          minimum: 0
        actualCost:
          type: number
          nullable: true
        depositAmount:
          type: number
          nullable: true
        depositPaid:
          type: boolean
          nullable: true
        paymentStatus:
          type: string
          enum: [unpaid, deposit_paid, partially_paid, paid]
        supplierId:
          type: string
          format: uuid
          nullable: true
        notes:
          type: string
          nullable: true
        dueDate:
          type: string
          format: date
          nullable: true
        createdAt:
          type: string
          format: date-time

    BudgetItemWriteRequest:
      type: object
      required: [name, category, estimatedCost]
      properties:
        name:
          type: string
        category:
          type: string
          enum: [venue, catering, photography, videography, flowers, entertainment, attire,
                 accommodation, transport, stationery, hair_makeup, cake, rings, honeymoon, other]
        estimatedCost:
          type: number
          minimum: 0
        actualCost:
          type: number
        depositAmount:
          type: number
        depositPaid:
          type: boolean
        paymentStatus:
          type: string
          enum: [unpaid, deposit_paid, partially_paid, paid]
          default: unpaid
        supplierId:
          type: string
          format: uuid
        notes:
          type: string
        dueDate:
          type: string
          format: date

    BudgetResponse:
      type: object
      required: [totalBudget, items]
      properties:
        totalBudget:
          type: number
        items:
          type: array
          items:
            $ref: '#/components/schemas/BudgetItem'

    BudgetSettingsRequest:
      type: object
      required: [totalBudget]
      properties:
        totalBudget:
          type: number
          minimum: 0

    # ── Suppliers ───────────────────────────────────────────────

    Supplier:
      type: object
      required: [id, name, category, contractStatus, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        category:
          type: string
          enum: [venue, catering, photography, videography, florist, entertainment,
                 attire, hair_makeup, cake, transport, accommodation, other]
        contactName:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
        website:
          type: string
          format: uri
          nullable: true
        address:
          type: string
          nullable: true
        contractStatus:
          type: string
          enum: [none, pending, signed]
        contractUrl:
          type: string
          format: uri
          nullable: true
        totalCost:
          type: number
          nullable: true
        depositAmount:
          type: number
          nullable: true
        depositPaid:
          type: boolean
          nullable: true
        balanceDue:
          type: number
          nullable: true
        balanceDueDate:
          type: string
          format: date
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    SupplierWriteRequest:
      type: object
      required: [name, category]
      properties:
        name:
          type: string
        category:
          type: string
          enum: [venue, catering, photography, videography, florist, entertainment,
                 attire, hair_makeup, cake, transport, accommodation, other]
        contactName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        website:
          type: string
          format: uri
        address:
          type: string
        contractStatus:
          type: string
          enum: [none, pending, signed]
          default: none
        contractUrl:
          type: string
          format: uri
        totalCost:
          type: number
        depositAmount:
          type: number
        depositPaid:
          type: boolean
        balanceDue:
          type: number
        balanceDueDate:
          type: string
          format: date
        notes:
          type: string

    # ── Tasks ───────────────────────────────────────────────────

    Task:
      type: object
      required: [id, title, category, status, priority, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
          enum: [venue, catering, invitations, attire, photography, entertainment,
                 flowers, transport, accommodation, legal, budget, other]
        status:
          type: string
          enum: [todo, in_progress, completed, cancelled]
        priority:
          type: string
          enum: [low, medium, high, urgent]
        dueDate:
          type: string
          format: date
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        assignedTo:
          type: string
          nullable: true
        supplierId:
          type: string
          format: uuid
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TaskWriteRequest:
      type: object
      required: [title, category]
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [venue, catering, invitations, attire, photography, entertainment,
                 flowers, transport, accommodation, legal, budget, other]
        status:
          type: string
          enum: [todo, in_progress, completed, cancelled]
          default: todo
        priority:
          type: string
          enum: [low, medium, high, urgent]
          default: medium
        dueDate:
          type: string
          format: date
        assignedTo:
          type: string
        supplierId:
          type: string
          format: uuid
        notes:
          type: string

  responses:
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

# ── Paths ──────────────────────────────────────────────────────

paths:

  # Auth ─────────────────────────────────────────────────────────

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in and receive a JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [Auth]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # Dashboard ────────────────────────────────────────────────────

  /dashboard:
    get:
      tags: [Dashboard]
      summary: Aggregated stats for the authenticated user's wedding
      responses:
        '200':
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # Guests ───────────────────────────────────────────────────────

  /guests:
    get:
      tags: [Guests]
      summary: List all guests
      responses:
        '200':
          description: Array of guests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Guest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Guests]
      summary: Add a guest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuestWriteRequest'
      responses:
        '201':
          description: Guest created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Guest'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /guests/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Guests]
      summary: Get a single guest
      responses:
        '200':
          description: Guest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Guest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Guests]
      summary: Update a guest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuestWriteRequest'
      responses:
        '200':
          description: Updated guest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Guest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Guests]
      summary: Delete a guest
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # RSVP (public) ────────────────────────────────────────────────

  /rsvp/{token}:
    parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [RSVP]
      summary: Get guest RSVP view (public — no auth required)
      security: []
      responses:
        '200':
          description: Guest RSVP data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RsvpPublicView'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [RSVP]
      summary: Submit RSVP response (public — no auth required)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RsvpSubmitRequest'
      responses:
        '200':
          description: RSVP accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: RSVP submitted successfully
        '404':
          $ref: '#/components/responses/NotFound'

  # Tables / Seating ─────────────────────────────────────────────

  /tables:
    get:
      tags: [Tables]
      summary: List all tables
      responses:
        '200':
          description: Array of tables
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SeatingTable'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Tables]
      summary: Create a table
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TableWriteRequest'
      responses:
        '201':
          description: Table created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeatingTable'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tables/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      tags: [Tables]
      summary: Update a table
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TableWriteRequest'
      responses:
        '200':
          description: Updated table
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeatingTable'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Tables]
      summary: Delete a table
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /tables/{id}/assign-guest:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [Tables]
      summary: Assign a guest to this table (moves them from any previous table)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignGuestRequest'
      responses:
        '200':
          description: Updated table
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeatingTable'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Table is at full capacity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tables/{id}/guests/{guestId}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: guestId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags: [Tables]
      summary: Unassign a guest from a table without deleting them
      responses:
        '200':
          description: Updated table
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeatingTable'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # Budget ───────────────────────────────────────────────────────

  /budget:
    get:
      tags: [Budget]
      summary: Get budget cap and all line items
      responses:
        '200':
          description: Budget data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Budget]
      summary: Add a budget line item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetItemWriteRequest'
      responses:
        '201':
          description: Budget item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

